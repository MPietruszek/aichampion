services:

  # ── Model PLLuM 70B (tylko tryb prod, wymaga 2× GPU A100) ──────────────────
  vllm:
    profiles: ["prod"]
    image: vllm/vllm-openai:latest
    runtime: nvidia
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    command: >
      --model CYFRAGOVPL/Llama-PLLuM-70B-instruct-2512
      --dtype bfloat16
      --quantization bitsandbytes
      --load-in-8bit
      --tensor-parallel-size 2
      --max-model-len 32768
    ports:
      - "8001:8000"
    volumes:
      - ./models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 2
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── Wektor DB ──────────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── Baza danych ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-czat_umowy}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB:-czat_umowy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI ─────────────────────────────────────────────────────────
  backend:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      - APP_ENV=${APP_ENV:-sandbox}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres/${POSTGRES_DB:-czat_umowy}
      - VLLM_URL=http://vllm:8000
      - QDRANT_URL=http://qdrant:6333
      - SECRET_KEY=${SECRET_KEY}
      - DOCUMENTS_PATH=${DOCUMENTS_PATH:-/data/documents}
    ports:
      - "8000:8000"
    volumes:
      - ./data/documents:/data/documents
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /app

  # ── Frontend React ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        # Przekazywany w czasie budowania obrazu — bake-in do JS bundle
        VITE_DEMO_MODE: ${VITE_DEMO_MODE:-true}
    depends_on: [backend]
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src

volumes:
  qdrant_data:
  postgres_data:
